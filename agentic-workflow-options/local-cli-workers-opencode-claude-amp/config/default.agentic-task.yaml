# Default configuration — copy to repo root as `agentic-task.yaml` or set AGENTIC_TASK_CONFIG.

version: 1

harness:
  name: cursor-local-workers
  approval_mode: approved_autonomy
  default_source: github_issue

github:
  default_remote: origin
  default_base_branch: main
  pr_draft: false
  auto_link_issues: true
  monitor_after_open: true

workers:
  default_engine: opencode
  max_parallel: 3
  timeout_minutes: 45
  engines:
    opencode:
      enabled: true
      command: opencode
      args: ["run", "--prompt-file", "{prompt_file}"]
    claude_code:
      enabled: true
      command: claude
      args: ["--print", "{prompt}"]
    amp:
      enabled: true
      command: amp
      args: ["-x", "{prompt}"]
      mode: smart

fanout:
  default: balanced
  candidates:
    balanced:
      - engine: opencode
      - engine: claude_code
      - engine: amp

approval:
  after_requirements: optional
  after_decomposition: required
  before_pr_creation: optional
  allow_full_autonomy: true

verification:
  required:
    - lint
    - typecheck
    - unit
    - code_review
    - security_review
    - requirements_coverage
  conditional:
    browser: ui_changes
    integration: integration_surface_changes
  block_on_security_findings: true
  require_all_must_requirements: true

retry:
  max_total_rounds: 3
  max_worker_retries: 2
  allow_alternate_worker_on_failure: true

artifacts:
  directory: .agent-runs
  keep_worker_logs: true
  redact_secrets: true

worktrees:
  root: .worktrees
