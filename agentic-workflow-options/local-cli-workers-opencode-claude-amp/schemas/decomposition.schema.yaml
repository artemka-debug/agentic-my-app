# JSON Schema (YAML representation) — stub for decomposition / task DAG documents.

$schema: https://json-schema.org/draft/2020-12/schema
$id: https://local.agentic-task/schemas/decomposition.schema.yaml
title: AgenticTaskDecomposition
description: >-
  Implementation task graph with worker hints (see docs/plan.md §11).

type: object
required: [tasks]
properties:
  tasks:
    type: array
    items:
      type: object
      required: [id, title, requirement_refs, depends_on, risk]
      properties:
        id: { type: string, pattern: "^TASK-[0-9]+$" }
        title: { type: string }
        requirement_refs:
          type: array
          items: { type: string }
        depends_on:
          type: array
          items: { type: string }
        risk:
          type: string
          enum: [low, medium, high]
        suggested_workers:
          type: array
          items: { type: string }
        expected_files:
          type: array
          items: { type: string }
        verification:
          type: array
          items: { type: string }
      additionalProperties: true
  notes:
    type: string
additionalProperties: true
