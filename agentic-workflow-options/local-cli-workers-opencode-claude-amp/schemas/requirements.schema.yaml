# JSON Schema (YAML representation) — stub for Product Owner / requirements documents.
# Validate with your preferred tool, e.g. `check-jsonschema` against a generated JSON export.

$schema: https://json-schema.org/draft/2020-12/schema
$id: https://local.agentic-task/schemas/requirements.schema.yaml
title: AgenticTaskRequirements
description: >-
  Structured requirements with traceability to source fragments (see docs/plan.md §10–§11).

type: object
required: [requirements]
properties:
  summary:
    type: string
  source:
    type: object
    properties:
      type:
        type: string
        enum: [github_issue, manual_prompt, local_spec]
      repo:
        type: string
      issue_number:
        type: integer
      url:
        type: string
    additionalProperties: true
  stakeholders:
    type: object
    additionalProperties: true
  labels:
    type: array
    items: { type: string }
  source_fragments:
    type: array
    items:
      type: object
      required: [id, kind]
      properties:
        id: { type: string, pattern: "^SRC-[0-9]+$" }
        kind:
          type: string
          enum: [issue_body, issue_comment, user_prompt, spec_excerpt]
        quote: { type: string }
        author: { type: string }
      additionalProperties: true
  open_questions:
    type: array
    items: { type: string }
  requirements:
    type: array
    items:
      type: object
      required: [id, priority, statement]
      properties:
        id: { type: string, pattern: "^REQ-[0-9]+$" }
        priority:
          type: string
          enum: [must, should, could]
        source_refs:
          type: array
          items: { type: string }
        statement: { type: string }
        acceptance:
          type: array
          items:
            type: object
            required: [id, statement]
            properties:
              id: { type: string, pattern: "^AC-[0-9]+$" }
              statement: { type: string }
            additionalProperties: true
        verification:
          type: array
          items: { type: object, additionalProperties: true }
      additionalProperties: true
additionalProperties: true
