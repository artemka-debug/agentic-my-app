# Workflow state machine (canonical states from docs/plan.md §14).
# Transitions are advisory for the orchestrator; invalid moves should be rejected in code.

initial: intake

states:
  intake:
    description: "Task source normalized; GitHub issue (or stub) captured into task brief."
    next:
      - clarifying
      - specified

  clarifying:
    description: "PO agent collecting answers; loops until requirements can be drafted."
    next:
      - specified
      - failed
      - cancelled

  specified:
    description: "requirements.yaml present and coherent enough to decompose."
    next:
      - decomposed
      - failed

  decomposed:
    description: "decomposition.yaml written; awaiting human approval by default."
    next:
      - awaiting_approval
      - implementing

  awaiting_approval:
    description: "Human or config gate before implementation starts."
    next:
      - implementing
      - cancelled
      - failed

  implementing:
    description: "One or more runtime adapters executing in worktrees."
    next:
      - verifying
      - failed
      - cancelled

  verifying:
    description: "Verifier pipeline evaluating candidates."
    next:
      - retrying
      - finalizing
      - failed

  retrying:
    description: "Targeted retry with additional context."
    next:
      - implementing
      - verifying
      - failed

  finalizing:
    description: "Prepare winning candidate; PR draft and artifacts."
    next:
      - pr_opened
      - failed

  pr_opened:
    description: "Pull request created; optional background monitoring."
    next:
      - monitoring_pr
      - complete

  monitoring_pr:
    description: "PR manager polling CI/reviews."
    next:
      - complete
      - implementing
      - failed

  complete:
    description: "Terminal success."
    next: []

  failed:
    description: "Terminal failure."
    next: []

  cancelled:
    description: "User cancelled."
    next: []
